name: Sync fund cache

on:
  schedule:
    - cron: "30 2 * * *" # 8:00 AM IST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate catalog
        run: node scripts/generate-catalog.mjs

      - name: Sync fund data
        run: node scripts/sync-fund-cache.mjs

      - name: Enrich TER and AUM
        run: node scripts/sync-enrichment.mjs

      - name: Commit cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/direct-growth-catalog.json src/data/fund-cache.json
          git diff --staged --quiet || git commit -m "chore: daily fund cache sync"
          git push
