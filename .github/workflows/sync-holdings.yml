name: Sync holdings

on:
  schedule:
    # 12th of each month, 4:00 UTC (~9:30 AM IST) — after AMC monthly disclosures
    - cron: "0 4 12 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Sync holdings from AMC disclosures
        run: node scripts/sync-holdings.mjs

      - name: Commit holdings cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/holdings-cache.json
          git diff --staged --quiet || git commit -m "chore: monthly holdings sync"
          git push
